<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="530" r="200" fill="white" opacity="0.05"/>
  <circle cx="900" cy="80" r="100" fill="white" opacity="0.03"/>

  <!-- Main card -->
  <rect x="100" y="140" width="1000" height="350" rx="24" fill="white" filter="url(#shadow)"/>

  <!-- Ballot box icon -->
  <g transform="translate(540, 180)">
    <rect x="0" y="20" width="120" height="100" rx="8" fill="#2563eb" opacity="0.1"/>
    <rect x="10" y="30" width="100" height="80" rx="4" fill="none" stroke="#2563eb" stroke-width="4"/>
    <rect x="35" y="20" width="50" height="20" rx="4" fill="#2563eb"/>
    <rect x="45" y="50" width="30" height="4" rx="2" fill="#2563eb"/>
    <rect x="45" y="62" width="30" height="4" rx="2" fill="#7c3aed"/>
    <rect x="45" y="74" width="30" height="4" rx="2" fill="#2563eb"/>
    <rect x="45" y="86" width="30" height="4" rx="2" fill="#7c3aed"/>
  </g>

  <!-- Hebrew text - Main title -->
  <text x="600" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#1f2937" direction="rtl">
    מי אשם בנפילת הדמוקרטיה?
  </text>

  <!-- Hebrew text - Subtitle -->
  <text x="600" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#6b7280" direction="rtl">
    חלקו 100% אשמה בין הגורמים השונים
  </text>

  <!-- Call to action -->
  <rect x="450" y="430" width="300" height="50" rx="25" fill="#2563eb"/>
  <text x="600" y="463" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">
    הצביעו עכשיו! 🗳️
  </text>

  <!-- Bottom branding -->
  <text x="600" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.9">
    סקר אינטראקטיבי - שתפו את דעתכם
  </text>
</svg>